components:
  schemas:
    School:
      allOf:
        - $ref: "#/components/schemas/Timestamp"
        - type: object
          properties:
            id:
              type: integer
            schoolId:
              type: string
              format: uuid
            logo:
              $ref: "#/components/schemas/Object"
            schoolImage:
              $ref: "#/components/schemas/Object"
            name:
              type: string
            slug:
              type: string
              example: "test-school"
            country:
              type: string
              example: CA
            state:
              type: string
            city:
              type: string
            address:
              type: string
            active:
              type: boolean
            link:
              type: string
              format: uri
            institutionType:
              type: string
              enum:
                - university
                - college
            ownershipType:
              type: string
              enum:
                - private
                - public
            currency:
              type: string
              enum:
                - USD
                - CAD
                - AUD
                - NGN
                - EUR
                - GBP
            createdById:
              type: string
            createdBy:
              $ref: "#/components/schemas/AdminProfile"
              nullable: true

            intakes:
              type: array
              items:
                $ref: "#/components/schemas/Intake"
              nullable: true

            accommodation:
              $ref: "#/components/schemas/Accommodation"
              nullable: true

            _count:
              type: object
              properties:
                programs:
                  type: integer
          required:
            - id
            - schoolId
            - logo
            - schoolImage
            - name
            - country
            - state
            - city
            - address
            - currency
            - ownershipType
            - institutionType
            - createdById
            - link
            - slug
