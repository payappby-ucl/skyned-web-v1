components:
  schemas:
    Team:
      allOf:
        - $ref: "#/components/schemas/Timestamp"
        - type: object
          properties:
            id:
              type: integer
            name:
              type: string
            leadId:
              type: string
            lead:
              $ref: "#/components/schemas/AdminProfile"
              nullable: true
            departmentId:
              type: integer
            department:
              $ref: "#/components/schemas/Department"
              nullable: true
            createdById:
              type: integer
            createdBy:
              $ref: "#/components/schemas/AdminProfile"
            members:
              type: array
              items:
                $ref: "#/components/schemas/AdminProfile"
              nullable: true
          required:
            - id
            - name
            - leadId
            - departmentId
