components:
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    SuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          minimum: 100
          maximum: 599
        success:
          type: boolean
          example: true
      required:
        - statusCode
        - success
    FailedResponse:
      type: object
      properties:
        statusCode:
          type: integer
          minimum: 100
          maximum: 599
        success:
          type: boolean
          example: false
        data:
          $ref: "#/components/schemas/MessageResponse"
      required:
        - statusCode
        - success
        - data
