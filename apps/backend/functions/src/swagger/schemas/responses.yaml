components:
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    SuccessResponse:
      type: object
      properties:
        statusCode:
          type: integer
          minimum: 100
          maximum: 599
        success:
          type: boolean
          example: true
      required:
        - statusCode
        - success
    PaginatedResponse:
      type: object
      properties:
        total:
          type: integer
        perPage:
          type: integer
          maximum: 100
        currentPage:
          type: integer
        nextPage:
          type: integer
        prevPage:
          type: integer
      required:
        - total
        - perPage
        - currentPage
    FailedResponse:
      type: object
      properties:
        statusCode:
          type: integer
          minimum: 100
          maximum: 599
        success:
          type: boolean
          example: false
        data:
          $ref: "#/components/schemas/MessageResponse"
      required:
        - statusCode
        - success
        - data
