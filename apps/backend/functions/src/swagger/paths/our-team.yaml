paths:
  /our-team:
    get:
      summary: Get Our team
      description: Get info of our team to display on public site
      operationId: getOurTeam
      tags:
        - Team
      responses:
        "200":
          description: Our team info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            firstName:
                              type: string
                            lastName:
                              type: string
                            jobTitle:
                              type: string
                            primaryImage:
                              $ref: "#/components/schemas/Object"
                              nullable: true
                            secondaryImage:
                              $ref: "#/components/schemas/Object"
                              nullable: true
                            socials:
                              type: array
                              items:
                                $ref: "#/components/schemas/Social"
                              nullable: true
                            about:
                              type: string
                              nullable: true
                          required:
                            - firstName
                            - lastName
                            - jobTitle
                            - primaryImage
        "500":
          $ref: "#/components/responses/ServerError"
