paths:
  /scholarships:
    post:
      summary: Handles scholarship creation
      description: Creates a scholarship on the database
      operationId: createScholarship
      tags:
        - Scholarship
      security:
        - bearerAuth: []
      requestBody:
        description: Data needed to create a scholarship
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                banner:
                  type: string
                  description: The scholarship banner
                title:
                  type: string
                subtitle:
                  type: string
                slug:
                  type: string
                  example: "test-scholarship"
                overview:
                  type: string
                description:
                  type: string
                category:
                  type: string
                  enum:
                    - accommodation
                    - tuition
                    - application fees
                    - others
                featured:
                  type: boolean
                eligibilityRequirements:
                  type: array
                  items:
                    type: string
              required:
                - title
                - subtitle
                - banner
                - overview
                - description
                - featured
                - eligibilityRequirements
                - slug
      responses:
        "201":
          description: Scholarship created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

    get:
      summary: Get Scholarships
      description: List of scholarships
      tags:
        - Scholarship
      operationId: listScholarships
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - in: query
          name: featured
          required: false
          schema:
            type: string
            enum:
              - true
        - in: query
          name: category
          required: false
          schema:
            type: string
            enum:
              - accommodation
              - tuition
              - application fees
              - others
      responses:
        "200":
          description: The scholarships
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PaginatedResponse"
                          - type: object
                            properties:
                              data:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Scholarship"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

