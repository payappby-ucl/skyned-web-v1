                  example: "test-school"
                country:
                  type: string
                  example: CA
                state:
                  type: string
                city:
                  type: string
                address:
                  type: string
                link:
                  type: string
                  format: uri
                institutionType:
                  type: string
                  enum:
                    - university
                    - college
                ownershipType:
                  type: string
                  enum:
                    - private
                    - public
                currency:
                  type: string
                  enum:
                    - USD
                    - CAD
                    - AUD
                    - NGN
                    - EUR
                    - GBP
              required:
