  /schools/{slug}/programs:
    summary: School programs operation

    post:
      summary: Creates a single program or bulk upload
      description: Creates a single program or bulk upload for a school
      operation: createPrograms
      security:
        - bearerAuth: []
      tags:
        - School
        - Program
      parameters:
        - $ref: "#/components/parameters/Slug"
      requestBody:
        description: >
          Data needed to create program
          NOTE: if type is 'bulk' then data should be an array, else an object
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - single
                    - bulk
                data:
                  anyOf:
                    - $ref: "#/components/schemas/CreateProgram"
                    - type: array
                      items:
                        $ref: "#/components/schemas/CreateProgram"

                startDate:
                  type: string
                  format: date-time

                deadline:
                  type: string
                  format: date-time
              required:
                - intake
                - deadline
                - startDate
      responses:
        "201":
          description: Creation Message Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
