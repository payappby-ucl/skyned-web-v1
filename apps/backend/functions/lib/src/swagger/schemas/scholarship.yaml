components:
  schemas:
    Scholarship:
      allOf:
        - $ref: "#/components/schemas/Timestamp"
        - type: object
          properties:
            id:
              type: integer
            scholarshipId:
              type: string
              format: uuid
            banner:
              $ref: "#/components/schemas/Object"
            title:
              type: string
            subtitle:
              type: string
            slug:
              type: string
              example: "test-scholarship"
            overview:
              type: string
            description:
              type: string
            active:
              type: boolean
            featured:
              type: boolean
            category:
              type: string
              enum:
                - accommodation
                - tuition
                - application fees
                - others
            eligibilityRequirements:
              type: array
              items:
                type: string
            createdById:
              type: string
            createdBy:
              $ref: "#/components/schemas/AdminProfile"
              nullable: true
          required:
            - id
            - scholarshipId
            - banner
            - title
            - subtitle
            - overview
            - description
            - category
            - eligibilityRequirements
            - slug
