paths:
  /auth/register:
    summary: Represents the initial flow for user sign up
    description: This route sends the user a verification email

    post:
      summary: Send Verification to user
      description: >
        User receives an email and also returns a message telling the user to check mail
      tags:
        - Auth
      operationId: sendEmailVerificationLink
      requestBody:
        description: Data needed to access this route
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: ahmed@skynedconsults.com
      responses:
        "200":
          description: Verification mail sent successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"
