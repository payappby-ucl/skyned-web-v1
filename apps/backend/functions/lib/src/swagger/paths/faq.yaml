paths:
  /faq:
    summary: FAQ Resource
    description: All routes as it concerns FAQ

    post:
      summary: Create FAQ Resource
      description: >
        Creates FAQ on DB
      tags:
        - Faq
      operationId: createFaq
      requestBody:
        description: Data needed to create FAQ
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                answer:
                  type: string
      responses:
        "201":
          description: Faq created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
