paths:
  /faq:
    summary: FAQ Resource
    description: All routes as it concerns FAQ

    post:
      summary: Create FAQ Resource
      description: >
        Creates FAQ on DB
      tags:
        - Faq
      operationId: createFaq
      requestBody:
        description: Data needed to create FAQ
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                answer:
                  type: string
      responses:
        "201":
          description: Faq created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    get:
      summary: Get FAQs from database
      description: >
        Saves and Get FAQs from database
      tags:
        - Faq
      operationId: getFaqs
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: The FAQs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PaginatedResponse"
                          - type: object
                            properties:
                              data:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Faq"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /faq/list:
    get:
      summary: Gets FAQs
      description: Fetches all FAQs from the database. Used for the public facing site
      tags:
        - Faq
      operationId: getFaqsForPublic
      responses:
        "200":
          description: The Faqs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Faq"
        "500":
          $ref: "#/components/responses/ServerError"

  /faq/{id}:
    summary: FAQ Resource
    description: Handles all routes regarding a single FAQ

    delete:
      summary: Delete FAQ
      description: >
        Deletes FAQ from database
      tags:
        - Faq
      operationId: deleteFaq
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: The messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
