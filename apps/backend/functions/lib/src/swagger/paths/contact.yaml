paths:
  /contact:
    summary: Represents Contact us function
    description: Contains all functionalities that has to do with contact us

    post:
      summary: Send contact us message to admin
      description: >
        Saves and send contact us message to admin
      tags:
        - Contact
      operationId: sendContactUsMessage
      requestBody:
        description: Data needed to access this route
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: bobslegend795@gmail.com
                name:
                  type: string
                  format: email
                subject:
                  type: string
                message:
                  type: string
                phoneNumber:
                  type: string
                  example: "+2348136239706"
      responses:
        "200":
          description: Contact us message created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimit"
        "500":
          $ref: "#/components/responses/ServerError"
