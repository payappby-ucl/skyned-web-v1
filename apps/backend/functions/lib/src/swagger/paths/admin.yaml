paths:
  /admins:
    summary: Admins Auth Route
    description: Handles all about other admins account

    post:
      summary: Create
      description: Creates an admin
      tags:
        - Admin
        - Auth
      operationId: createAdmin
      security:
        - bearerAuth: []
      requestBody:
        description: Data needed to access this route
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: ahmed@skynedconsults.com
                firstName:
                  type: string
                middleName:
                  type: string
                  nullable: true
                lastName:
                  type: string
                gender:
                  type: string
                  enum:
                    - Male
                    - Female
                    - Others
                nationality:
                  type: string
                  example: "NG"
                countryOfResidence:
                  type: string
                  example: "CA"
                about:
                  type: string
                  nullable: true
                phoneNumber:
                  type: string
                  example: +2348136239706
                primaryImage:
                  type: string
                  format: uri
                  description: Data URI of the image
                secondaryImage:
                  type: string
                  format: uri
                  description: Data URI of the image
                socials:
                  type: array
                  items:
                    $ref: "#/components/schemas/Social"
                jobTitle:
                  type: string
                  example: CEO
                departments:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                        enum:
                          - Executive
                          - Marketing
                          - Admissions
                          - Communications
                          - Technical
                          - Human_Resource
                          - Quality_Assurance
                    required:
                      - id
                      - name
              required:
                - firstName
                - lastName
                - email
                - phoneNumber
                - primaryImage
                - jobTitle
                - nationality
                - countryOfResidence
                - departments
                - gender
      responses:
        "201":
          description: Created admin data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Admin"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

    get:
      summary: Get Admins
      description: Gets list of admins from database
      tags:
        - Admin
      operationId: listAdmins
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: The admins
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PaginatedResponse"
                          - type: object
                            properties:
                              data:
                                type: array
                                items:
                                  allOf:
                                    - $ref: "#/components/schemas/Admin"
                                    - type: object
                                      properties:
                                        _count:
                                          type: object
                                          properties:
                                            departments:
                                              type: integer
                                            teams:
                                              type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"

  /admins/me:
    summary: Admin Auth Route
    description: Handles all about the currently signed admin account

    get:
      summary: Get user data
      description: >
        Gets the auth user data
      tags:
        - Admin
        - Auth
      operationId: getAdminMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Auth admin data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Admin"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"

  /admins/{adminId}:
    summary: Admin Route
    description: Handles all about any admin that's not the current admin

    get:
      summary: Get admin data
      description: >
        Gets the admin data
      tags:
        - Admin
      operationId: getAdminByAdminId
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminId"
      responses:
        "200":
          description: Admin data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Admin"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      summary: Update admin data
      description: >
        Updates the admin data
      tags:
        - Admin
      operationId: updateAdminByAdminId
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminId"
      requestBody:
        description: Data needed to access this route
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: ahmed@skynedconsults.com
                firstName:
                  type: string
                middleName:
                  type: string
                  nullable: true
                lastName:
                  type: string
                gender:
                  type: string
                  enum:
                    - Male
                    - Female
                    - Others
                nationality:
                  type: string
                  example: "NG"
                countryOfResidence:
                  type: string
                  example: "CA"
                about:
                  type: string
                  nullable: true
                phoneNumber:
                  type: string
                  example: +2348136239706
                primaryImage:
                  type: string
                  format: uri
                  description: Data URI of the image
                secondaryImage:
                  type: string
                  format: uri
                  description: Data URI of the image
                socials:
                  type: array
                  items:
                    $ref: "#/components/schemas/Social"
                jobTitle:
                  type: string
                  example: CEO
              required:
                - firstName
                - lastName
                - email
                - phoneNumber
                - jobTitle
                - nationality
                - countryOfResidence
                - departments
                - gender
      responses:
        "200":
          description: Admin data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/ServerError"
