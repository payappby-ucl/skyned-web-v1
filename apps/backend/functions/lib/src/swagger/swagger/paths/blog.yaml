paths:
  /blogs:
    summary: Blog Resource
    description: All routes as it concerns blogs

    post:
      summary: Create blog Resource
      description: >
        Creates blog on DB
      tags:
        - Blog
      operationId: createBlog
      security:
        - bearerAuth: []
      requestBody:
        description: Data needed to create blog
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                slug:
                  type: string
                excerpt:
                  type: string
                content:
                  type: string
                coverImage:
                  type: string
                  format: uri
                  description: Data URI of the image
                status:
                  type: string
                  enum:
                    - draft
                    - published
                    - unpublished
                    - scheduled
                publishedAt:
                  type: string
                  format: date-time
                  nullable: true
                categories:
                  type: array
                  properties:
                    type: string
                tags:
                  type: array
                  properties:
                    type: string
      responses:
        "201":
          description: Blog created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/ServerError"
    get:
      summary: Get blogs from database
      description: >
        Get blogs from database
      tags:
        - Blog
      operationId: getBlogs
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - type: object
          properties:
            s:
              type: string
              enum: ["draft", "published", "unpublished", "scheduled"]
            f: 
              type: boolean
            c:
              type: string
      responses:
        "200":
          description: The Blogs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/PaginatedResponse"
                          - type: object
                            properties:
                              data:
                                type: array
                                items:
                                  $ref: "#/components/schemas/Blog"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/ServerError"

  /blogs/{id}:
    summary: Blog Resource
    description: Handles all routes regarding a single Blog

    get:
      summary: Get blog
      description: >
        Gets blog from database
      tags:
        - Blog
      operationId: getBlog
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: The Blog
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Blog"
                      nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      summary: Update Blog Resource
      description: >
        Update Blog on DB
      tags:
        - Blog
      operationId: updateBlog
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        description: Data needed to update Blog
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                answer:
                  type: string
      responses:
        "200":
          description: blog updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Delete Blog
      description: >
        Deletes Blog from database
      tags:
        - Blog
      operationId: deleteBlog
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: The messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/UnAuthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
