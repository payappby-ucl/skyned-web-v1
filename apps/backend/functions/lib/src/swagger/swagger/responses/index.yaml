components:
  responses:
    NotFound:
      description: The resource you're looking for is not found or the route you're visiting is not valid
      content:
        application/json:
          schemas:
            $ref: "#/components/schemas/FailedResponse"
    BadRequest:
      description: Client error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FailedResponse"
    UnAuthenticated:
      description: User identity is not known
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FailedResponse"
    Forbidden:
      description: User is known but is not permitted to access the content
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FailedResponse"
    Conflict:
      description: This response is sent when a request conflicts with the current state of the server
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FailedResponse"
    RateLimit:
      description: This response has hit a rate limit
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FailedResponse"
    ServerError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FailedResponse"
