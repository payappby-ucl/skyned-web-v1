components:
  schemas:
    AdminProfile:
      type: object
      properties:
        adminId:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        gender:
          type: string
          enum:
            - Male
            - Female
            - Others
        primaryImage:
          $ref: "#/components/schemas/Object"
          nullable: true
        phoneNumber:
          $ref: "#/components/schemas/PhoneNumber"
          nullable: true
        jobTitle:
          type: string
