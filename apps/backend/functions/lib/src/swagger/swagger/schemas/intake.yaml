components:
  schemas:
    Intake:
      allOf:
        - $ref: "#/components/schemas/Timestamp"
        - type: object
          properties:
            id:
              type: integer

            intake:
              type: string
              format: date-time

            status:
              type: string
              enum:
                - open
                - closed
                - likely_open

            startDate:
              type: string
              format: date-time
              nullable: true

            deadline:
              type: string
              format: date-time
              nullable: true

            schoolId:
              type: string

            createdById:
              type: string

            school:
              $ref: "#/components/schemas/School"
              nullable: true

            createdBy:
              $ref: "#/components/schemas/AdminProfile"
              nullable: true

          required:
            - id
            - intake
            - schoolId
            - createdById
