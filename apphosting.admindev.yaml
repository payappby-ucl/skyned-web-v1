runConfig:
  cpu: 3
  memoryMiB: 1024
  maxInstances: 4
  minInstances: 0
  concurrency: 100

env:
  - variable: NEXT_PUBLIC_BASE_URL
    value: https://api-dxmhb5dscq-uc.a.run.app
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_API_URL
    value: https://api-dxmhb5dscq-uc.a.run.app/api
    availability:
      - BUILD
      - RUNTIME

  - variable: PROJECT_NAME
    value: "@skyned/admin"
    availability:
      - BUILD
      - RUNTIME
